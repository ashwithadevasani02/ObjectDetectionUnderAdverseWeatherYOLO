<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Deep Tech Blue to Sky Blue -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="50%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0EA5E9" />
    </linearGradient>
    
    <!-- Cloud Gradient: Soft White / Metallic Slate -->
    <linearGradient id="cloud-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#E2E8F0" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>

    <!-- Scan Line Gradient: Glowing Amber / Gold -->
    <linearGradient id="scan-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.2" />
      <stop offset="15%" stop-color="#FBBF24" />
      <stop offset="50%" stop-color="#FFFDE7" />
      <stop offset="85%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.2" />
    </linearGradient>
  </defs>
  
  <!-- Rounded Base Container -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bg-grad)" />
  
  <!-- Object Detection Target Brackets -->
  <g stroke="#38BDF8" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85">
    <!-- Top Left -->
    <path d="M 130,200 L 130,130 L 200,130" />
    <!-- Top Right -->
    <path d="M 382,200 L 382,130 L 312,130" />
    <!-- Bottom Left -->
    <path d="M 130,312 L 130,382 L 200,382" />
    <!-- Bottom Right -->
    <path d="M 382,312 L 382,382 L 312,382" />
  </g>

  <!-- Weather Cloud -->
  <g fill="url(#cloud-grad)">
    <!-- Left Bubble -->
    <circle cx="180" cy="295" r="55" />
    <!-- Center Bubble -->
    <circle cx="256" cy="235" r="85" />
    <!-- Right Bubble -->
    <circle cx="335" cy="295" r="60" />
    <!-- Connecting Fills -->
    <rect x="180" y="235" width="155" height="85" />
    <rect x="130" y="310" width="250" height="40" rx="20" />
  </g>

  <!-- Slanted Raindrops (Adverse Weather) -->
  <g stroke="#38BDF8" stroke-width="12" stroke-linecap="round" opacity="0.8">
    <line x1="195" y1="365" x2="180" y2="395" />
    <line x1="256" y1="365" x2="241" y2="395" />
    <line x1="317" y1="365" x2="302" y2="395" />
  </g>

  <!-- Laser / Bounding Box Scanning Line (Detection Active) -->
  <!-- Wide Glow -->
  <line x1="80" y1="270" x2="432" y2="270" stroke="url(#scan-grad)" stroke-width="24" stroke-linecap="round" />
  <!-- Core Line -->
  <line x1="80" y1="270" x2="432" y2="270" stroke="#FFF" stroke-width="6" stroke-linecap="round" opacity="0.9" />
  <!-- Center Target Dot -->
  <circle cx="256" cy="270" r="12" fill="#EF4444" stroke="#FFF" stroke-width="4" />
</svg>
